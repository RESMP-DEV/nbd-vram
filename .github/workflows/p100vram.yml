# ci/build.yml - GitHub Actions for the p100vram-shelf project.
#
# Two jobs:
#   build-mac   - always green signal: unit tests against stubs.
#   build-linux - kernel module + CUDA sidecar; continue-on-error until
#                 CUDA toolkit / NVIDIA driver headers land on the runner.
name: build
on:
  push:
    branches: [main, master]
  pull_request:

# Least-privilege: this workflow only reads the repo and runs builds.
# No releases, no deployments, no PR comment writes needed.
permissions:
  contents: read

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build all (stub CUDA)
        run: make all
      - name: Unit tests
        run: make test

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)
      - name: Build allocator + gdr + sidecar
        run: make alloc gdr sidecar-cuda sidecar
      - name: Build kernel module (no NVIDIA headers on runner)
        run: make kmod || echo "kmod needs NVIDIA P2P headers; expected on CI"
      - name: Unit tests
        run: make test
