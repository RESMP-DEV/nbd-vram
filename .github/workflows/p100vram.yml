# .github/workflows/p100vram.yml - CI for the p100vram-shelf project.
#
# Two execution paths:
#   - Self-hosted macOS runner (kearm-m4-nbdvram) for same-repo PRs and
#     pushes. Bypasses GitHub billed minutes entirely, so it works even
#     with the org's $0 Actions spending limit. SECURITY: only fires for
#     pushes and PRs whose head branch is in RESMP-DEV/nbd-vram itself;
#     fork PRs skip this job so a stranger's PR cannot run code on the
#     runner host.
#   - Hosted Ubuntu runner as a fallback for fork PRs (and as a Linux
#     build signal). Ubuntu minutes are free + unlimited for public
#     repos, but this still needs the org's past-due balance settled
#     before it can actually start; until then fork PRs have no CI.
#
# Both paths run the same build + test, so coverage is identical.
name: build
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

# Self-hosted runs only for trusted events. Keep this expression in
# sync with the if: on the self-hosted job below.
jobs:
  # Trusted-path CI on the self-hosted Mac runner. No billed minutes.
  unit-tests-self-hosted:
    # Only run for pushes, and for PRs whose head repo is THIS repo
    # (not a fork). Fork PRs fall through to the hosted job below.
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, mac-arm64-nbdvram]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build (stub CUDA)
        run: make all
      - name: Unit tests
        run: make test

  # Fallback: hosted Ubuntu runner. Free for public repos once the org's
  # Actions billing lock is cleared. Used for fork PRs and as a Linux
  # build signal. Stays non-required so it doesn't block merges while
  # the billing lock is still in place.
  unit-tests-hosted:
    # Run on pushes always; for PRs, only run on forks (same-repo PRs
    # are covered by the self-hosted job above).
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build (stub CUDA)
        run: make all
      - name: Unit tests
        run: make test

  # Optional Linux build signal: allocator + gdr + sidecar + kmod. The
  # kmod step is non-blocking (no NVIDIA headers on the hosted runner).
  build-linux:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name != github.repository)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)
      - name: Build allocator + gdr + sidecar
        run: make alloc gdr sidecar-cuda sidecar
      - name: Build kernel module
        continue-on-error: true
        run: make kmod
